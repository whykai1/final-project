<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You Have Been Observed</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400&family=Roboto+Condensed:wght@400;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Three.js (used by sketch.js for the map page) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <style>

    /* ============================================================
       BASE RESET & DESIGN TOKENS
       To retheme the site, change the values in :root below.
    ============================================================ */

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #080808;
      --surface:  #1c1c1c;
      --border:   rgba(255,255,255,0.08);
      --border-2: rgba(255,255,255,0.15);
      --text:     #f0f0f0;
      --muted:    #666666;
      --muted-2:  #444444;
      --red:      #e02020;
      --red-dim:  #8a1515;
      --red-bg:   rgba(224,32,32,0.08);
      --mono: 'Roboto Mono', monospace;
      --cond: 'Roboto Condensed', sans-serif;
      --sans: 'Roboto', sans-serif;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
    }


    /* ============================================================
       PAGE SYSTEM
       Each page is a fixed full-screen flex column:
         [sticky header  — does not scroll]
         [.page-scroll   — scrolls]
         [.page-nav      — always pinned at the bottom]
    ============================================================ */

    .page {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      opacity: 0; pointer-events: none;
      transition: opacity 0.5s ease;
      background: var(--bg);
    }
    .page.active { opacity: 1; pointer-events: all; }

    .page-scroll {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      min-height: 0; /* critical: lets flex child shrink below content height */
    }

    /* nav bar — lives outside .page-scroll so it never moves */
    .page-nav {
      flex-shrink: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.1rem 2.5rem;
      border-top: 1px solid var(--border);
      background: rgba(8,8,8,0.97);
      z-index: 50;
    }
    .btn-back, .btn-fwd {
      font-family: var(--mono); font-size: 0.7rem;
      letter-spacing: 0.14em; text-transform: uppercase;
      background: transparent; color: var(--muted);
      border: 1px solid var(--muted-2);
      padding: 0.6rem 1.4rem; cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }
    .btn-back:hover { color: var(--text); border-color: var(--border-2); }
    .btn-fwd  { color: var(--text); border-color: var(--red-dim); }
    .btn-fwd:hover { border-color: var(--red); color: var(--red); }
    .btn-ghost { opacity: 0; pointer-events: none; padding: 0.6rem 1.4rem; }
    .nav-label {
      font-family: var(--mono); font-size: 0.65rem;
      letter-spacing: 0.15em; color: var(--muted-2);
    }

    /* shared heading utilities */
    .eyebrow {
      font-family: var(--mono); font-size: 0.65rem;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--red); margin-bottom: 0.6rem;
    }
    .page-heading {
      font-family: var(--cond); font-size: clamp(1.8rem,4vw,3rem);
      font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.04em; color: var(--text); line-height: 1.1;
    }


    /* ============================================================
       PAGE 1 — INTRO
    ============================================================ */

    #page-intro { justify-content: center; align-items: center; }

    .intro-bg {
      position: absolute; inset: 0;
      background-image:
        radial-gradient(ellipse 70% 50% at 50% 40%, rgba(224,32,32,0.04) 0%, transparent 70%),
        repeating-linear-gradient(0deg,  transparent, transparent 59px, rgba(255,255,255,0.02) 60px),
        repeating-linear-gradient(90deg, transparent, transparent 59px, rgba(255,255,255,0.02) 60px);
    }

    #intro-data-grid {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      overflow: hidden; opacity: 0.045;
      pointer-events: none; user-select: none;
    }
    #intro-data-grid span {
      font-family: var(--mono); font-size: 10px;
      letter-spacing: 0.12em; color: var(--red);
      white-space: nowrap; line-height: 1.9;
    }

    .intro-bg-title {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center; pointer-events: none; z-index: 0;
    }
    .intro-bg-title h1 {
      font-family: var(--cond); font-size: clamp(3rem,8vw,6.5rem);
      font-weight: 700; letter-spacing: 0.04em;
      text-transform: uppercase; line-height: 1.0;
      color: var(--text); opacity: 0.06;
    }

    .popup-overlay {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.8);
      display: flex; align-items: center; justify-content: center;
      z-index: 10;
    }
    .popup {
      border: 1px solid rgba(224,32,32,0.3);
      background: var(--surface);
      width: min(520px, 90vw);
      padding: 2.5rem; position: relative;
    }
    .popup::before {
      content: ''; position: absolute;
      top: 0; left: 0; right: 0; height: 2px; background: var(--red);
    }
    .popup-eyebrow {
      font-family: var(--mono); font-size: 0.65rem;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--red); margin-bottom: 1.2rem;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .popup-eyebrow::before {
      content: ''; display: inline-block;
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--red); animation: blink 1.4s ease infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }
    .popup h2 {
      font-family: var(--cond); font-size: 1.7rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.02em;
      line-height: 1.2; color: var(--text); margin-bottom: 1rem;
    }
    .popup p {
      font-size: 0.85rem; font-weight: 300; line-height: 1.75;
      color: rgba(240,240,240,0.55); margin-bottom: 0.75rem;
    }
    .popup p strong { color: var(--text); font-weight: 500; }
    .popup-fine {
      font-family: var(--mono); font-size: 0.63rem;
      color: rgba(240,240,240,0.22); line-height: 1.65;
      border-top: 1px solid var(--border);
      padding-top: 1rem; margin-top: 1rem; margin-bottom: 1.75rem;
    }
    .popup-actions { display: flex; gap: 1rem; align-items: center; }
    .btn-accept {
      flex: 1; padding: 0.85rem 1.5rem;
      background: var(--red); color: #fff; border: none;
      font-family: var(--mono); font-size: 0.72rem;
      letter-spacing: 0.14em; text-transform: uppercase;
      cursor: pointer; transition: background 0.2s;
    }
    .btn-accept:hover { background: #ff2a2a; }
    .btn-decline {
      flex: 1; padding: 0.85rem 1.5rem;
      background: transparent; color: rgba(240,240,240,0.12);
      border: 1px solid rgba(240,240,240,0.07);
      font-family: var(--mono); font-size: 0.72rem;
      letter-spacing: 0.14em; text-transform: uppercase;
      cursor: not-allowed; position: relative;
    }
    .btn-decline::after {
      content: 'unavailable';
      position: absolute; bottom: -1.3rem; left: 50%;
      transform: translateX(-50%);
      font-size: 0.58rem; letter-spacing: 0.1em;
      color: rgba(240,240,240,0.15); white-space: nowrap;
    }


    /* ============================================================
       PAGE 2 — VIDEO
    ============================================================ */

    #page-video { background: #000; }
    #page-video .page-scroll { position: relative; }

    #surveillance-video {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }

    #tv-flash {
      position: absolute; inset: 0;
      background: #fff; opacity: 0;
      pointer-events: none; z-index: 20;
    }

    @keyframes tv-off {
      0%   { transform: scaleY(1)     scaleX(1);   opacity: 1   }
      60%  { transform: scaleY(1)     scaleX(1);   opacity: 1   }
      75%  { transform: scaleY(0.02)  scaleX(1.1); opacity: 0.8 }
      85%  { transform: scaleY(0.001) scaleX(1.2); opacity: 0.4 }
      100% { transform: scaleY(0)     scaleX(1.3); opacity: 0   }
    }


    /* ============================================================
       PAGE 3 — TIMELINE
    ============================================================ */

    .tl-header {
      flex-shrink: 0;
      padding: 3rem 6vw 2rem;
      border-bottom: 1px solid var(--border);
    }
    .tl-scene {
      padding: 3rem 6vw;
      perspective: 1200px;
      min-height: 540px; overflow: hidden;
    }
    .iso-stage {
      position: relative; width: 100%;
      transform-style: preserve-3d;
      transform: rotateX(52deg) rotateZ(-45deg);
      transform-origin: center center;
      margin: 0 auto; height: 500px;
    }
    .iso-track {
      position: absolute; left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      width: 70%; height: 2px;
      background: rgba(224,32,32,0.25);
    }
    .iso-node {
      position: absolute; top: 50%;
      transform: translateY(-50%);
      display: flex; flex-direction: column;
      align-items: center; cursor: pointer;
    }
    .iso-node .pin {
      width: 12px; height: 12px; border-radius: 50%;
      background: #181818; border: 2px solid var(--red);
      transition: transform 0.2s, background 0.2s;
      position: relative; z-index: 2;
    }
    .iso-node:hover .pin { background: var(--red); transform: scale(1.5); }
    .iso-node .pole { width: 1px; background: rgba(224,32,32,0.2); }
    .iso-node.above .pole { order: -1; }
    .iso-node .card {
      background: var(--surface); border: 1px solid var(--border);
      border-left: 2px solid var(--red-dim);
      padding: 0.65rem 0.9rem; width: 150px;
      transition: border-left-color 0.2s;
    }
    .iso-node:hover .card { border-left-color: var(--red); }
    .card-year  {
      font-family: var(--mono); font-size: 0.6rem;
      letter-spacing: 0.15em; color: var(--red); margin-bottom: 0.25rem;
    }
    .card-title {
      font-family: var(--cond); font-size: 0.8rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.02em;
      color: var(--text); line-height: 1.25;
    }
    .card-tag {
      font-family: var(--mono); font-size: 0.57rem;
      color: var(--muted); letter-spacing: 0.08em; margin-top: 0.25rem;
    }
    .tl-info { padding: 0 6vw 2rem; }
    .info-box {
      border-left: 2px solid var(--red); padding-left: 1.5rem;
      opacity: 0; transition: opacity 0.35s; min-height: 4rem;
    }
    .info-box.visible { opacity: 1; }
    .ib-year {
      font-family: var(--mono); font-size: 0.65rem;
      letter-spacing: 0.2em; color: var(--red);
      margin-bottom: 0.4rem; text-transform: uppercase;
    }
    .ib-title {
      font-family: var(--cond); font-size: 1.3rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.03em;
      color: var(--text); margin-bottom: 0.5rem;
    }
    .ib-body {
      font-size: 0.875rem; font-weight: 300;
      color: rgba(240,240,240,0.6); line-height: 1.8; max-width: 640px;
    }


    /* ============================================================
       PAGE 4 — MAP
    ============================================================ */

    #page-map { overflow: hidden; }
    .map-header {
      flex-shrink: 0;
      padding: 2rem 2.5rem 1.25rem;
      border-bottom: 1px solid var(--border);
    }
    #three-canvas { flex: 1; display: block; width: 100%; min-height: 0; }
    .map-legend {
      flex-shrink: 0; padding: 0.85rem 2.5rem;
      display: flex; gap: 1.75rem;
      border-top: 1px solid var(--border);
    }
    .legend-item {
      display: flex; align-items: center; gap: 0.4rem;
      font-family: var(--mono); font-size: 0.62rem;
      letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase;
    }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; }


    /* ============================================================
       PAGE 5 — ARTICLE
    ============================================================ */

    .article-header {
      max-width: 720px; margin: 0 auto;
      padding: 4.5rem 2rem 2.5rem;
      border-bottom: 1px solid var(--border);
    }
    .article-kicker {
      font-family: var(--mono); font-size: 0.65rem;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--red); margin-bottom: 1rem;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .article-kicker::before {
      content: ''; display: inline-block;
      width: 18px; height: 2px; background: var(--red);
    }
    .article-header h2 {
      font-family: var(--cond); font-size: clamp(2rem,5vw,3.2rem);
      font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.03em; line-height: 1.05;
      color: var(--text); margin-bottom: 1.2rem;
    }
    .article-deck {
      font-size: 1.05rem; font-weight: 300; font-style: italic;
      color: rgba(240,240,240,0.5); line-height: 1.65;
    }
    .article-meta {
      font-family: var(--mono); font-size: 0.62rem;
      letter-spacing: 0.12em; color: var(--muted-2);
      margin-top: 1.5rem; display: flex; gap: 2rem; text-transform: uppercase;
    }
    .article-body { max-width: 720px; margin: 0 auto; padding: 3rem 2rem 5rem; }
    .article-body p {
      font-size: 1rem; font-weight: 300; line-height: 1.85;
      color: rgba(240,240,240,0.72); margin-bottom: 1.5rem;
    }
    .article-body h3 {
      font-family: var(--cond); font-size: 1.1rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--text); margin: 2.5rem 0 1rem;
      display: flex; align-items: center; gap: 0.75rem;
    }
    .article-body h3::before {
      content: ''; display: inline-block;
      width: 12px; height: 2px; background: var(--red); flex-shrink: 0;
    }
    .article-pullquote {
      border-left: 2px solid var(--red);
      padding: 0.5rem 0 0.5rem 1.5rem;
      margin: 2.5rem 0; background: var(--red-bg);
    }
    .article-pullquote p {
      font-size: 1.15rem !important; font-style: italic; font-weight: 400;
      color: var(--text) !important; line-height: 1.55 !important; margin: 0 !important;
    }
    .article-note {
      border-top: 1px solid var(--border); padding-top: 1.25rem; margin-top: 3rem;
      font-family: var(--mono); font-size: 0.68rem;
      color: var(--muted); line-height: 1.75;
    }

  </style>
</head>
<body>
  <!--
    The body is intentionally empty.
    All pages are built and injected by sketch.js.
  -->
  <script src="sketch.js"></script>
</body>
</html>
